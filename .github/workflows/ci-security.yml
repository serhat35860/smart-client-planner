name: ci-security

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: file:./dev.db

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-local-jwt-secret-must-be-32-chars-min
          DATABASE_URL: file:./dev.db

      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
